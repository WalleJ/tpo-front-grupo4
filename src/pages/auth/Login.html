
<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-O Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    body { min-height: 100dvh; font-family: 'Sora', sans-serif; background: #fcf8f9; color: #1c1b1c; }
    .mesh-gradient {
      background-image:
        radial-gradient(at 0% 0%, rgba(0,219,233,0.07) 0px, transparent 55%),
        radial-gradient(at 100% 100%, rgba(0,105,112,0.07) 0px, transparent 55%);
    }
    .glass-panel {
      background: rgba(252,248,249,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(185,202,203,0.3);
    }
    .cyber-glow-focus:focus-within {
      outline: none;
      box-shadow: 0 0 0 2px rgba(0,219,233,0.3);
      border-color: #00dbe9;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="mesh-gradient flex items-center justify-center min-h-screen p-4">
  <div class="glass-panel rounded-3xl shadow-2xl p-10 w-full max-w-md flex flex-col items-center gap-6">
    <div class="flex flex-col items-center gap-2 mb-2">
      <span class="material-symbols-outlined text-primary text-5xl">blur_on</span>
      <h1 class="font-display text-2xl md:text-3xl font-bold text-primary tracking-tight">AI-O HOME</h1>
      <span class="font-label-caps text-label-caps text-on-surface-variant text-xs">Marketplace Login</span>
    </div>
    <form id="login-form" class="flex flex-col gap-4 w-full">
      <div class="flex flex-col gap-1 cyber-glow-focus">
        <label for="username" class="font-label-caps text-label-caps text-on-surface-variant text-xs">Username</label>
        <input type="text" id="username" placeholder="Username" class="bg-surface-container-lowest border border-outline-variant/50 px-4 py-3 rounded-xl font-body-md focus:outline-none w-full" required>
      </div>
      <div class="flex flex-col gap-1 cyber-glow-focus">
        <label for="password" class="font-label-caps text-label-caps text-on-surface-variant text-xs">Password</label>
        <input type="password" id="password" placeholder="Password" class="bg-surface-container-lowest border border-outline-variant/50 px-4 py-3 rounded-xl font-body-md focus:outline-none w-full" required>
      </div>
      <button type="submit" class="bg-primary text-on-primary px-6 py-3 rounded-xl font-label-caps text-label-caps active:scale-95 transition-all shadow-lg shadow-primary/20 mt-2">Sign in</button>
    </form>
    <div id="login-error" class="text-error mt-2 hidden text-center font-bold"></div>
    <div class="w-full flex flex-col items-center mt-2 gap-2">
      <a href="Recover.html" class="text-primary text-xs font-bold hover:underline">Forgot your password?</a>
      <a href="Register.html" class="text-on-surface-variant text-xs hover:underline">Create a new account</a>
    </div>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      let role = null;
      if(username === 'admin' && password === 'admin') role = 'ADMIN';
      else if(username === 'user' && password === 'user') role = 'USER';
      if(role) {
        localStorage.setItem('role', role);
        window.location.href = role === 'ADMIN' ? '../admin/AdminDashboard.html' : '../shop/AI-O_v5.html#home';
      } else {
        document.getElementById('login-error').innerText = 'Invalid credentials';
        document.getElementById('login-error').classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
